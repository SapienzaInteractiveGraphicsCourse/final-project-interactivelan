<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StaticDefense — Debug Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e12;
      --panel: #15151b;
      --text: #e8e5dc;
      --muted: #8f8a7a;
      --line: #2a2a33;
      --accent: #c7ff3c;
      --accent-dim: #809d2e;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .shell {
      position: fixed;
      top: 48px;
      left: 48px;
      width: min(720px, calc(100vw - 96px));
      border: 1px solid var(--line);
      background: var(--panel);
      z-index: 10;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .content {
      padding: 24px;
    }

    h1 {
      font-size: 40px;
      line-height: 0.95;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
      max-width: 52ch;
      line-height: 1.5;
    }

    .menu {
      display: grid;
      gap: 10px;
    }

    a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 14px 16px;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }

    a span:first-child {
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    a span:last-child {
      color: var(--muted);
      font-size: 14px;
    }

    a:hover {
      background: var(--accent);
      color: #111;
      border-color: var(--accent);
    }

    a:hover span:last-child {
      color: #111;
    }

    .footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <span>StaticDefense</span>
      <span>Debug Menu</span>
    </div>

    <div class="content">
      <h1>DEBUG<br>SCREEN</h1>
      <p class="subtitle">
        Select a test scene. Use this page to test individual components behavior without running the full scenario.
      </p>

      <nav class="menu">
        <a href="?scene=main">
          <span>Main</span>
          <span>Putting things together</span>
        </a>
        <a href="?scene=terrain">
          <span>Terrain</span>
          <span>Height / placement</span>
        </a>
        <a href="?scene=launcher">
          <span>Launcher</span>
          <span>Turret / firing</span>
        </a>
        <a href="?scene=tank">
          <span>Tank</span>
          <span>Hitboxes / hit state</span>
        </a>
        <a href="?scene=tv">
          <span>TV</span>
          <span>Television for intro</span>
        </a>
      </nav>

      <div class="footer">
        It is what it is.
      </div>
    </div>
  </main>

  <script type="module" src="./src/debug/debug_index.js"></script>
</body>
</html>
