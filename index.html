<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StaticDefense</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0a0a;
      --border: #1d1d1b;
      --text:   #c8c4bb;
      --dim:    #4a4844;
      --accent: #7a9450;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 28px 28px;
      color: var(--text);
      font-family: "Courier New", monospace;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* Scanline overlay — ties into the TV intro aesthetic */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 48px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    #menu-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: -1;
    }

    h1 {
      font-size: clamp(52px, 8vw, 100px);
      line-height: 0.9;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
    }

    /* Terminal block cursor after the title */
    .cursor {
      display: inline-block;
      width: 0.5em;
      height: 0.8em;
      background: var(--text);
      vertical-align: middle;
      margin-left: 6px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .meta {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 2.2;
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 14px;
    }

    nav {
      display: grid;
      gap: 6px;
    }

    a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 14px 16px;
      color: var(--text);
      transition: color 90ms ease, border-color 90ms ease;
    }

    a .label {
      font-size: 13px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    a .desc {
      font-size: 11px;
      color: var(--dim);
      transition: color 90ms ease;
    }

    a:hover { color: var(--accent); border-color: var(--accent); }
    a:hover .desc { color: var(--accent); opacity: 0.6; }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 13px 48px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--dim);
    }
  </style>
  <script type="module" crossorigin src="/final-project-interactivelan/assets/index-BYEK1kxs.js"></script>
  <link rel="modulepreload" crossorigin href="/final-project-interactivelan/assets/loader-BcyVLW1i.js">
  <link rel="modulepreload" crossorigin href="/final-project-interactivelan/assets/menu_bg-2GwDszCx.js">
</head>
<body>
  <header>
    <span>static defense</span>
    <span>debug terminal</span>
  </header>

  <div class="layout">
    <div class="left">
      <canvas id="menu-bg"></canvas>
      <h1>STATIC<br>DEFENSE<span class="cursor"></span></h1>
      <div class="meta">
        <div>build &mdash;  debug</div>
      </div>
    </div>

    <div class="right">
      <p class="section-label">select scene</p>
      <nav>
        <a href="?scene=main">
          <span class="label">Main</span>

        </a>
        <a href="?scene=terrain">

        <a href="?scene=launcher">

        <a href="?scene=tank">

        <a href="?scene=tv">

        <a href="?scene=model">

      </nav>
    </div>
  </div>

  <footer>
    <span>It is what it is.</span>
    <span>interactive Graphics &mdash; 2026</span>
  </footer>

</body>
</html>
